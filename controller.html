<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Robot Rivals Controller</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:monospace;color:#fff;touch-action:none;}
#topbar{position:absolute;top:0;left:0;right:0;height:32px;display:flex;align-items:center;justify-content:center;gap:16px;z-index:10;}
#status{font-size:12px;color:#666;}
#status.ok{color:#4c4;}
#playerSel{background:#222;color:#fff;border:1px solid #555;font-family:monospace;font-size:13px;padding:2px 6px;border-radius:4px;}
#refreshBtn{background:#222;color:#aaa;border:1px solid #555;font-family:monospace;font-size:13px;padding:2px 8px;border-radius:4px;cursor:pointer;}
#refreshBtn:active{background:#333;color:#fff;}
#holdBtn{position:absolute;background:#222;color:#aaa;border:2px solid #555;font-family:monospace;font-size:20px;font-weight:bold;border-radius:10px;cursor:pointer;z-index:20;display:flex;align-items:center;justify-content:center;}
#holdBtn.on{background:rgba(255,80,80,0.35);color:#ff8080;border-color:rgba(255,80,80,0.7);}

/* Main layout: left half = dpad zone, right half = buttons */
#dpadZone{position:absolute;left:0;width:45%;bottom:0;}
#btnZone{position:absolute;right:0;top:32px;width:55%;bottom:0;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:8px;padding:8px;}

/* D-pad visual indicator (canvas drawn) */
#dpadCanvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:0.5;}

/* Action buttons fill right half */
.abtn{border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:bold;color:rgba(255,255,255,0.6);border:2px solid;flex-shrink:0;}
.abtn.active{color:#fff;}

#b-jump{background:rgba(68,170,255,0.1);border-color:rgba(68,170,255,0.3);}
#b-jump.active{background:rgba(68,170,255,0.4);border-color:rgba(68,170,255,0.8);}
#b-light{background:rgba(100,255,100,0.08);border-color:rgba(100,255,100,0.25);}
#b-light.active{background:rgba(100,255,100,0.35);border-color:rgba(100,255,100,0.7);}
#b-heavy{background:rgba(255,100,100,0.08);border-color:rgba(255,100,100,0.25);}
#b-heavy.active{background:rgba(255,100,100,0.35);border-color:rgba(255,100,100,0.7);}
#b-shield{background:rgba(255,200,50,0.08);border-color:rgba(255,200,50,0.25);}
#b-shield.active{background:rgba(255,200,50,0.35);border-color:rgba(255,200,50,0.7);}
#b-boost{background:rgba(100,180,255,0.08);border-color:rgba(100,180,255,0.25);}
#b-boost.active{background:rgba(100,180,255,0.45);border-color:rgba(100,180,255,0.9);box-shadow:0 0 16px rgba(100,180,255,0.6);}

/* Portrait layout */
@media (orientation:portrait){
  #holdBtn{top:32px;left:0;right:0;height:56px;}
  #dpadZone{width:100%;height:40%;top:auto;bottom:0;}
  #btnZone{width:100%;height:calc(60% - 88px);top:88px;bottom:auto;flex-direction:row;}
  .abtn{width:30%;height:44%;}
  #dpadCanvas{width:240px;height:240px;}
}
/* Landscape layout */
@media (orientation:landscape){
  #holdBtn{top:32px;left:0;width:40%;height:56px;}
  #dpadZone{width:40%;top:88px;height:calc(100% - 88px);}
  #btnZone{
    width:60%;height:calc(100% - 32px);
    display:grid;
    grid-template-columns:repeat(6,1fr);
    grid-template-rows:1fr 1fr;
    gap:6px;padding:8px;
  }
  .abtn{width:100%;height:100%;font-size:18px;}
  #b-light{grid-column:1/3;grid-row:1;}
  #b-heavy{grid-column:3/5;grid-row:1;}
  #b-jump{grid-column:5/7;grid-row:1;}
  #b-shield{grid-column:1/4;grid-row:2;}
  #b-boost{grid-column:4/7;grid-row:2;}
  #dpadCanvas{width:240px;height:240px;}
}
</style>
</head>
<body>
<button id="holdBtn">HOLD</button>
<div id="topbar">
  <div id="status">Connecting...</div>
  <select id="playerSel"><option value="1">P1</option><option value="2">P2</option><option value="3">P3</option><option value="4">P4</option></select>
  <button id="refreshBtn" onclick="location.reload()">↺</button>
</div>

<div id="dpadZone">
  <canvas id="dpadCanvas" width="260" height="260"></canvas>
</div>

<div id="btnZone">
  <div class="abtn" id="b-light" data-key="light">LIGHT</div>
  <div class="abtn" id="b-heavy" data-key="heavy">HEAVY</div>
  <div class="abtn" id="b-jump" data-key="jump">GRAB</div>
  <div class="abtn" id="b-shield" data-key="shield">SHIELD</div>
  <div class="abtn" id="b-boost" data-key="boost">BOOST</div>
</div>

<script>
const state={left:false,right:false,up:false,down:false,jump:false,light:false,heavy:false,shield:false,boost:false,hold:false};
const statusEl=document.getElementById('status');
const playerSel=document.getElementById('playerSel');
const dpadZone=document.getElementById('dpadZone');
const dpadCanvas=document.getElementById('dpadCanvas');
const dpadCtx=dpadCanvas.getContext('2d');
let ws=null;

// Track touches: each touch is either 'dpad' or a button key
const touches=new Map(); // touchId -> {zone:'dpad'|'btn', key:string|null}

function connect(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}`);
  ws.onopen=()=>{
    statusEl.textContent='Connected';statusEl.className='ok';
  };
  ws.onmessage=(e)=>{
    try{
      const msg=JSON.parse(e.data);
      if(msg.type==='welcome'){
        playerSel.value=msg.player;
        ws.send(JSON.stringify({type:'register',role:'controller',player:msg.player}));
      }
    }catch(e){}
  };
  ws.onclose=()=>{statusEl.textContent='Disconnected';statusEl.className='';setTimeout(connect,2000);};
  ws.onerror=()=>{};
}

function send(){
  if(ws&&ws.readyState===1){
    ws.send(JSON.stringify({type:'input',player:parseInt(playerSel.value),...state}));
  }
}

// D-pad: determine direction from touch position relative to zone center
function getDpadDir(tx,ty){
  const rect=dpadZone.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const dx=tx-cx, dy=ty-cy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<18) return {left:false,right:false,up:false,down:false}; // dead zone
  const ang=Math.atan2(dy,dx);
  // 8-direction with diagonals
  const left=ang>Math.PI*0.625||ang<-Math.PI*0.625;
  const right=ang>-Math.PI*0.375&&ang<Math.PI*0.375;
  const up=ang<-Math.PI*0.125&&ang>-Math.PI*0.875;
  const down=ang>Math.PI*0.125&&ang<Math.PI*0.875;
  return {left,right,up,down};
}

function applyDpad(tx,ty){
  const dir=getDpadDir(tx,ty);
  state.left=dir.left; state.right=dir.right;
  state.up=dir.up; state.down=dir.down;
  drawDpad(dir);
}

function clearDpad(){
  state.left=false;state.right=false;state.up=false;state.down=false;
  drawDpad({left:false,right:false,up:false,down:false});
}

function drawDpad(dir){
  const c=dpadCtx, w=dpadCanvas.width, h=dpadCanvas.height, cx=w/2, cy=h/2;
  c.clearRect(0,0,w,h);
  // Cross background
  const s=44, L=96;
  c.fillStyle='rgba(255,255,255,0.06)';
  c.fillRect(cx-s,cy-L,s*2,L*2); // vertical
  c.fillRect(cx-L,cy-s,L*2,s*2); // horizontal
  // Direction arrows
  const arrows=[
    {key:'up',   x:cx,y:cy-70,a:-Math.PI/2},
    {key:'down', x:cx,y:cy+70,a:Math.PI/2},
    {key:'left', x:cx-70,y:cy,a:Math.PI},
    {key:'right',x:cx+70,y:cy,a:0},
  ];
  for(const ar of arrows){
    const on=dir[ar.key];
    c.save();c.translate(ar.x,ar.y);c.rotate(ar.a);
    c.fillStyle=on?'rgba(255,255,255,0.7)':'rgba(255,255,255,0.2)';
    c.beginPath();c.moveTo(22,0);c.lineTo(-13,-16);c.lineTo(-13,16);c.closePath();c.fill();
    c.restore();
  }
}

function isInDpadZone(tx,ty){
  const rect=dpadZone.getBoundingClientRect();
  return tx>=rect.left&&tx<=rect.right&&ty>=rect.top&&ty<=rect.bottom;
}

function getBtnFromPoint(tx,ty){
  const el=document.elementFromPoint(tx,ty);
  return (el&&el.dataset&&el.dataset.key)?el:null;
}

function handleTouchStart(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    const tx=t.clientX,ty=t.clientY;
    if(isInDpadZone(tx,ty)){
      touches.set(t.identifier,{zone:'dpad'});
      applyDpad(tx,ty);
      send();
    }else{
      const btn=getBtnFromPoint(tx,ty);
      if(btn){
        const key=btn.dataset.key;
        touches.set(t.identifier,{zone:'btn',key});
        state[key]=true;
        btn.classList.add('active');
        send();
      }
    }
  }
}

function handleTouchMove(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    const info=touches.get(t.identifier);
    if(!info)continue;
    const tx=t.clientX,ty=t.clientY;
    if(info.zone==='dpad'){
      applyDpad(tx,ty);
      send();
    }else{
      // Button zone: check if finger slid to a different button
      const btn=getBtnFromPoint(tx,ty);
      const newKey=btn?btn.dataset.key:null;
      if(newKey!==info.key){
        if(info.key){state[info.key]=false;const ob=document.querySelector(`[data-key="${info.key}"]`);if(ob)ob.classList.remove('active');}
        if(newKey){state[newKey]=true;btn.classList.add('active');info.key=newKey;}
        else{info.key=null;}
        send();
      }
    }
  }
}

function handleTouchEnd(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    const info=touches.get(t.identifier);
    if(!info){continue;}
    if(info.zone==='dpad'){
      // Only clear dpad if no other dpad touches remain
      touches.delete(t.identifier);
      let hasDpad=false;
      for(const [,v] of touches){if(v.zone==='dpad'){hasDpad=true;break;}}
      if(!hasDpad)clearDpad();
    }else{
      if(info.key){state[info.key]=false;const btn=document.querySelector(`[data-key="${info.key}"]`);if(btn)btn.classList.remove('active');}
      touches.delete(t.identifier);
    }
    send();
  }
}

const gameZone=document.getElementById('dpadZone');
const btnZoneEl=document.getElementById('btnZone');
for(const el of [gameZone,btnZoneEl]){
  el.addEventListener('touchstart',handleTouchStart,{passive:false});
  el.addEventListener('touchmove',handleTouchMove,{passive:false});
  el.addEventListener('touchend',handleTouchEnd,{passive:false});
  el.addEventListener('touchcancel',handleTouchEnd,{passive:false});
}

playerSel.addEventListener('change',()=>{
  if(ws&&ws.readyState===1){
    // Send all-clear for the old player first
    const oldPlayer=parseInt(playerSel.value)===1?2:1;
    ws.send(JSON.stringify({type:'input',player:oldPlayer,left:false,right:false,up:false,down:false,jump:false,light:false,heavy:false,shield:false,boost:false}));
    // Register as new player
    ws.send(JSON.stringify({type:'register',role:'controller',player:parseInt(playerSel.value)}));
  }
  // Clear all local touch state (including hold toggle)
  for(const k of Object.keys(state))state[k]=false;
  holdBtn.classList.remove('on');
  touches.clear();
  clearDpad();
  document.querySelectorAll('.abtn').forEach(b=>b.classList.remove('active'));
});

// Hold button toggle
const holdBtn=document.getElementById('holdBtn');
holdBtn.addEventListener('click',()=>{
  state.hold=!state.hold;
  holdBtn.classList.toggle('on',state.hold);
  send();
});
holdBtn.addEventListener('touchstart',(e)=>{e.preventDefault();state.hold=!state.hold;holdBtn.classList.toggle('on',state.hold);send();},{passive:false});

// Initial draw
drawDpad({left:false,right:false,up:false,down:false});
connect();
</script>
</body>
</html>
